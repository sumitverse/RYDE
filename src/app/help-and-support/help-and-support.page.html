<ion-content [fullscreen]="true" class="help-content">
  
  <div class="chat-section">
    <div class="chat-header">
      <ion-button (click)="goBack()" fill="clear" class="back-button">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
      <div class="chat-header-content">
        <div class="chat-avatar">
          <ion-icon name="chatbubble-outline"></ion-icon>
        </div>
        <div class="chat-info">
          <h3 class="chat-title">Chat with Support</h3>
          <p class="chat-subtitle">We're here to help 24/7</p>
        </div>
      </div>
      <div class="contact-buttons">
        <ion-button fill="clear" size="small" (click)="contactSupport('phone')" class="contact-btn">
          <ion-icon name="call-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" size="small" (click)="contactSupport('email')" class="contact-btn">
          <ion-icon name="mail-outline"></ion-icon>
        </ion-button>
      </div>
    </div>

    
    <div class="messages-container" #chatContainer>
      <div class="messages-list">
        <div 
          *ngFor="let message of messages" 
          class="message-wrapper"
          [class.user-message]="message.sender === 'user'"
          [class.bot-message]="message.sender === 'bot'">
          <div class="message-bubble" [class.user-bubble]="message.sender === 'user'">
            <div class="message-content">
              <p class="message-text">{{ message.text }}</p>
              <span class="message-time">{{ formatTime(message.timestamp) }}</span>
            </div>
            <div class="message-avatar" *ngIf="message.sender === 'bot'">
              <ion-icon name="chatbubble-outline"></ion-icon>
            </div>
            <div class="message-avatar user-avatar" *ngIf="message.sender === 'user'">
              <ion-icon name="person-outline"></ion-icon>
            </div>
          </div>
        </div>

        
        <div class="message-wrapper bot-message" *ngIf="isTyping">
          <div class="message-bubble bot-bubble">
            <div class="message-content">
              <div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
            <div class="message-avatar">
              <ion-icon name="chatbubble-outline"></ion-icon>
            </div>
          </div>
        </div>
      </div>
    </div>

    
    <div class="message-input-container">
      <div class="input-wrapper">
        <ion-input
          #messageInput
          [(ngModel)]="newMessage"
          placeholder="Type your message..."
          class="message-input"
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading">
        </ion-input>
        <ion-button 
          (click)="sendMessage()" 
          [disabled]="!newMessage.trim() || isLoading"
          class="send-button"
          fill="solid"
          color="success">
          <ion-icon name="send-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
